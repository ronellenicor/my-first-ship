<title>Ronell Nicor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #000000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #000000;
    border: 1px solid #333333;
    border-radius: 16px;
    max-width: 480px;
    width: 100%;
    padding: 48px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    text-align: center;
  }
  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 24px;
    border: 3px solid #ffffff;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  h1 {
    color: #ffffff;
    font-size: 26px;
    margin-bottom: 6px;
  }
  .role {
    color: #93c5fd;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.3px;
    margin-bottom: 24px;
  }
  .desc {
    color: #d1d5db;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .contact {
    display: inline-block;
    background: #ffffff;
    color: #000000;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s, color 0.2s;
  }
  .contact:hover { background: #93c5fd; }
</style>
