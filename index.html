<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronell Nicor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    border-radius: 16px;
    max-width: 480px;
    width: 100%;
    padding: 48px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    text-align: center;
  }
  .avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    color: white;
    font-size: 32px;
    font-weight: 700;
  }
  h1 {
    color: #0f172a;
    font-size: 26px;
    margin-bottom: 6px;
  }
  .role {
    color: #3b82f6;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.3px;
    margin-bottom: 24px;
  }
  .desc {
    color: #475569;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .contact {
    display: inline-block;
    background: #0f172a;
    color: #ffffff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .contact:hover { background: #3b82f6; }
</style>
</head>
<body>
  <div class="card">
    <div class="avatar">RN</div>
    <h1>Ronell Nicor</h1>
    <div class="role">Service Delivery Team Lead II</div>
    <p class="desc">
      I lead a team of service delivery professionals, focused on performance,
      client engagement, and getting things done right. Whether you're a colleague,
      a client, or someone on my team — I'm glad you're here.
    </p>
    <a href="mailto:hello@example.com" class="contact">Get in Touch</a>
  </div>
</body>
</html>
